<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>ComboPaste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #07070d;
      color: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .bg-orb-1 {
      position: fixed; width: 500px; height: 500px;
      top: -150px; right: -100px;
      background: radial-gradient(circle, rgba(96,165,250,0.1), transparent);
      border-radius: 50%; filter: blur(100px);
      pointer-events: none; z-index: 0;
      animation: float1 14s ease-in-out infinite;
    }
    .bg-orb-2 {
      position: fixed; width: 400px; height: 400px;
      bottom: -100px; left: -100px;
      background: radial-gradient(circle, rgba(167,139,250,0.08), transparent);
      border-radius: 50%; filter: blur(100px);
      pointer-events: none; z-index: 0;
      animation: float2 16s ease-in-out infinite;
    }
    @keyframes float1 {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(50px,-40px) scale(1.08); }
      50% { transform: translate(-20px,50px) scale(0.95); }
      75% { transform: translate(-40px,-20px) scale(1.05); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(-40px,40px) scale(1.05); }
      50% { transform: translate(40px,-30px) scale(0.92); }
      75% { transform: translate(30px,30px) scale(1.08); }
    }
    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }
    .glass::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    }
    .gradient-text {
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: gradientShift 4s ease-in-out infinite;
    }
    @keyframes gradientShift {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .tabs {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .tab {
      padding: 8px 20px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.4);
      transition: all 0.2s;
    }
    .tab:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
    .tab.active {
      background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(139,92,246,0.2));
      border: 1px solid rgba(139,92,246,0.3);
      color: #c4b5fd;
    }
    .paste-input {
      width: 100%; height: 320px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      color: #e2e8f0;
      padding: 16px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    .paste-input:focus {
      border-color: rgba(96,165,250,0.3);
    }
    .paste-input::placeholder {
      color: rgba(255,255,255,0.15);
    }
    .drop-zone {
      border: 2px dashed rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: rgba(96,165,250,0.4);
      background: rgba(96,165,250,0.05);
    }
    .drop-zone.dragover {
      border-color: #60a5fa;
      background: rgba(96,165,250,0.1);
    }
    .stats-row {
      display: flex; justify-content: space-between;
      margin-top: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }
    .submit-btn {
      width: 100%; margin-top: 16px; padding: 14px;
      border-radius: 12px; border: none;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(59,130,246,0.3);
    }
    .submit-btn:disabled {
      opacity: 0.6; cursor: not-allowed;
    }
    .result-card {
      margin-top: 16px; padding: 24px;
      animation: fadeUp 0.3s ease-out;
    }
    .result-input {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #93c5fd;
      padding: 10px 12px;
      font-size: 13px;
      outline: none;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 13px;
      color: #fff;
      z-index: 100;
      animation: fadeUp 0.3s ease-out;
      display: none;
    }
    .toast.error { border-color: rgba(239,68,68,0.3); color: #fca5a5; }
    .toast.success { border-color: rgba(52,211,153,0.3); color: #6ee7b7; }
    @media (max-width: 640px) {
      .paste-input { height: 240px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb-1"></div>
  <div class="bg-orb-2"></div>

  <div style="position:relative;z-index:10;max-width:680px;margin:0 auto;padding:40px 16px 80px">

    <!-- Header -->
    <header style="text-align:center;margin-bottom:40px;animation:fadeUp 0.5s ease-out">
      <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 24px rgba(59,130,246,0.25)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      </div>
      <h1 class="gradient-text" style="font-size:38px;font-weight:800">ComboPaste</h1>
      <p style="margin-top:8px;font-size:14px;color:rgba(255,255,255,0.35)">Paste a combolist &mdash; get a permanent GitHub link</p>
    </header>

    <!-- Main Card -->
    <div class="glass" style="padding:24px;animation:fadeUp 0.5s ease-out 0.1s both">
      <div class="tabs">
        <button id="tabPaste" class="tab active">Paste</button>
        <button id="tabUpload" class="tab">Upload</button>
      </div>

      <!-- Paste View -->
      <div id="pasteView">
        <textarea id="pasteInput" class="paste-input" placeholder="Paste your combolist here...&#10;&#10;email:password&#10;user:pass&#10;line by line"></textarea>
      </div>

      <!-- Upload View -->
      <div id="uploadView" style="display:none">
        <div id="dropZone" class="drop-zone">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p style="margin-top:12px;color:rgba(255,255,255,0.35);font-size:13px">Drop a <strong>.txt</strong> file here or click to browse</p>
          <input id="fileInput" type="file" accept=".txt" hidden />
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <span id="lineCount">0 lines</span>
        <span id="charCount">0 chars</span>
      </div>

      <!-- Submit -->
      <button id="submitBtn" class="submit-btn">
        <span id="submitText">Generate Link</span>
      </button>
    </div>

    <!-- Result Card -->
    <div id="resultCard" class="glass result-card" style="display:none">
      <p style="font-size:11px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:10px">Permanent Link</p>
      <div style="display:flex;gap:8px">
        <input id="resultLink" class="result-input" readonly />
        <button id="copyBtn" class="submit-btn" style="width:auto;padding:10px 20px;margin:0;flex-shrink:0">Copy</button>
      </div>
      <div style="display:flex;gap:16px;margin-top:10px">
        <a id="rawLink" href="#" target="_blank" style="font-size:12px;color:rgba(255,255,255,0.3);text-decoration:none">View RAW &rarr;</a>
        <a id="githubLink" href="#" target="_blank" style="font-size:12px;color:rgba(255,255,255,0.3);text-decoration:none">Open on GitHub &rarr;</a>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" style="display:none;text-align:center;margin-top:24px;animation:fadeUp 0.3s ease-out">
      <div class="spinner"></div>
      <p style="margin-top:16px;color:rgba(255,255,255,0.4);font-size:13px">Creating paste...</p>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    // ===== CONFIG — replace these =====
    const PAT = 'github_pat_11AVHHKAY0ZcknJzVAb8dL_nUIETUvFraejJHk0'
    const OWNER = 'imramflow'
    const DATA_REPO = 'ComboPaste-Data'
    const SOURCE_REPO = 'ComboPaste'
    const API_BASE = 'https://api.github.com'

    // ===== DOM =====
    const tabPaste = document.getElementById('tabPaste')
    const tabUpload = document.getElementById('tabUpload')
    const pasteView = document.getElementById('pasteView')
    const uploadView = document.getElementById('uploadView')
    const pasteInput = document.getElementById('pasteInput')
    const fileInput = document.getElementById('fileInput')
    const dropZone = document.getElementById('dropZone')
    const submitBtn = document.getElementById('submitBtn')
    const submitText = document.getElementById('submitText')
    const resultCard = document.getElementById('resultCard')
    const resultLink = document.getElementById('resultLink')
    const rawLink = document.getElementById('rawLink')
    const githubLink = document.getElementById('githubLink')
    const copyBtn = document.getElementById('copyBtn')
    const loading = document.getElementById('loading')
    const lineCount = document.getElementById('lineCount')
    const charCount = document.getElementById('charCount')
    const toast = document.getElementById('toast')

    // ===== TOAST =====
    let toastTimer

    function showToast(msg, type) {
      clearTimeout(toastTimer)
      toast.textContent = msg
      toast.className = 'toast ' + (type || '')
      toast.style.display = 'block'
      toastTimer = setTimeout(() => { toast.style.display = 'none' }, 3000)
    }

    // ===== TABS =====
    function setActiveTab(mode) {
      tabPaste.className = 'tab' + (mode === 'paste' ? ' active' : '')
      tabUpload.className = 'tab' + (mode === 'upload' ? ' active' : '')
      pasteView.style.display = mode === 'paste' ? 'block' : 'none'
      uploadView.style.display = mode === 'upload' ? 'block' : 'none'
    }

    tabPaste.onclick = () => setActiveTab('paste')
    tabUpload.onclick = () => setActiveTab('upload')

    // ===== PASTE INPUT =====
    pasteInput.oninput = updateStats

    function updateStats() {
      const text = pasteInput.value
      const lines = text ? text.split('\n').length : 0
      lineCount.textContent = lines.toLocaleString() + ' lines'
      charCount.textContent = text.length.toLocaleString() + ' chars'
    }

    // ===== FILE UPLOAD =====
    dropZone.onclick = () => fileInput.click()

    dropZone.ondragover = (e) => {
      e.preventDefault()
      dropZone.classList.add('dragover')
    }
    dropZone.ondragleave = () => dropZone.classList.remove('dragover')
    dropZone.ondrop = (e) => {
      e.preventDefault()
      dropZone.classList.remove('dragover')
      const file = e.dataTransfer.files[0]
      if (file && file.name.endsWith('.txt')) readFile(file)
      else showToast('Please drop a .txt file', 'error')
    }
    fileInput.onchange = () => {
      if (fileInput.files[0]) readFile(fileInput.files[0])
    }

    function readFile(file) {
      if (file.size > 50 * 1024 * 1024) {
        showToast('File too large (max 50MB)', 'error')
        return
      }
      const reader = new FileReader()
      reader.onload = (e) => {
        pasteInput.value = e.target.result
        updateStats()
        setActiveTab('paste')
        showToast('Loaded ' + file.name, 'success')
      }
      reader.onerror = () => showToast('Failed to read file', 'error')
      reader.readAsText(file)
    }

    // ===== SUBMIT =====
    submitBtn.onclick = async () => {
      const content = pasteInput.value
      if (!content.trim()) {
        showToast('Paste something first', 'error')
        return
      }

      submitBtn.disabled = true
      submitText.textContent = 'Creating...'
      resultCard.style.display = 'none'
      loading.style.display = 'block'

      const id = crypto.randomUUID()
      const filename = id + '.txt'
      const path = 'pastes/' + filename

      try {
        const base64 = btoa(unescape(encodeURIComponent(content)))

        const res = await fetch(API_BASE + '/repos/' + OWNER + '/' + DATA_REPO + '/contents/' + path, {
          method: 'PUT',
          headers: {
            'Authorization': 'Bearer ' + PAT,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message: 'Add paste ' + id,
            content: base64,
          })
        })

        if (!res.ok) {
          const err = await res.json().catch(() => ({}))
          throw new Error(err.message || 'HTTP ' + res.status)
        }

        // Fire-and-forget dispatch to private repo
        fetch(API_BASE + '/repos/' + OWNER + '/' + SOURCE_REPO + '/dispatches', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + PAT,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            event_type: 'paste-created',
            client_payload: { id, filename }
          })
        }).catch(() => {})

        const link = 'https://' + OWNER + '.github.io/' + DATA_REPO + '/' + path
        const raw = 'https://raw.githubusercontent.com/' + OWNER + '/' + DATA_REPO + '/main/' + path
        const gh = 'https://github.com/' + OWNER + '/' + DATA_REPO + '/blob/main/' + path

        resultLink.value = link
        rawLink.href = raw
        githubLink.href = gh
        resultCard.style.display = 'block'

        showToast('Paste created!', 'success')

      } catch (err) {
        showToast(err.message || 'Something went wrong', 'error')
      } finally {
        loading.style.display = 'none'
        submitBtn.disabled = false
        submitText.textContent = 'Generate Link'
      }
    }

    // ===== COPY =====
    copyBtn.onclick = () => {
      resultLink.select()
      navigator.clipboard.writeText(resultLink.value).then(() => {
        copyBtn.textContent = 'Copied!'
        setTimeout(() => { copyBtn.textContent = 'Copy' }, 2000)
      }).catch(() => {
        document.execCommand('copy')
        copyBtn.textContent = 'Copied!'
        setTimeout(() => { copyBtn.textContent = 'Copy' }, 2000)
      })
    }

    // ===== KEYBOARD =====
    pasteInput.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitBtn.click()
    })
  </script>
</body>
</html>
