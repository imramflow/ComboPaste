<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>ComboPaste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #07070d;
      color: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    #particleCanvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .bg-orb-1 {
      position: fixed; width: 500px; height: 500px;
      top: -150px; right: -100px;
      background: radial-gradient(circle, rgba(96,165,250,0.1), transparent);
      border-radius: 50%; filter: blur(100px);
      pointer-events: none; z-index: 0;
      animation: float1 14s ease-in-out infinite;
    }
    .bg-orb-2 {
      position: fixed; width: 400px; height: 400px;
      bottom: -100px; left: -100px;
      background: radial-gradient(circle, rgba(167,139,250,0.08), transparent);
      border-radius: 50%; filter: blur(100px);
      pointer-events: none; z-index: 0;
      animation: float2 16s ease-in-out infinite;
    }
    @keyframes float1 {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(50px,-40px) scale(1.08); }
      50% { transform: translate(-20px,50px) scale(0.95); }
      75% { transform: translate(-40px,-20px) scale(1.05); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(-40px,40px) scale(1.05); }
      50% { transform: translate(40px,-30px) scale(0.92); }
      75% { transform: translate(30px,30px) scale(1.08); }
    }
    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.3s;
    }
    .glass:hover {
      box-shadow: 0 8px 48px rgba(96,165,250,0.08), 0 8px 32px rgba(0,0,0,0.2);
    }
    .glass::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    }
    .gradient-text {
      color: #a78bfa;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: gradientShift 4s ease-in-out infinite;
    }
    @keyframes gradientShift {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes progressPulse {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }
    @keyframes confettoFall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .tabs {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .tab {
      padding: 8px 20px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.4);
      transition: all 0.2s;
    }
    .tab:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
    .tab.active {
      background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(139,92,246,0.2));
      border: 1px solid rgba(139,92,246,0.3);
      color: #c4b5fd;
    }
    .paste-input {
      width: 100%; height: 320px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      color: #e2e8f0;
      padding: 16px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    .paste-input:focus {
      border-color: rgba(96,165,250,0.3);
    }
    .paste-input::placeholder {
      color: rgba(255,255,255,0.15);
    }
    .drop-zone {
      border: 2px dashed rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: rgba(96,165,250,0.4);
      background: rgba(96,165,250,0.05);
    }
    .drop-zone.dragover {
      border-color: #60a5fa;
      background: rgba(96,165,250,0.1);
    }
    .stats-row {
      display: flex; justify-content: space-between;
      margin-top: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }
    .submit-btn {
      width: 100%; margin-top: 16px; padding: 14px;
      border-radius: 12px; border: none;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(59,130,246,0.3);
    }
    .submit-btn:disabled {
      opacity: 0.6; cursor: not-allowed;
    }
    .submit-btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transform: scale(0);
      animation: rippleAnim 0.6s ease-out;
      pointer-events: none;
    }
    .progress-bar {
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      margin-top: 12px;
      overflow: hidden;
      display: none;
    }
    .progress-bar.active {
      display: block;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #a78bfa, #f472b6, #3b82f6);
      background-size: 300% 100%;
      border-radius: 4px;
      animation: progressPulse 2s linear infinite;
      transition: width 0.3s;
    }
    .result-card {
      margin-top: 16px; padding: 24px;
      animation: fadeUp 0.3s ease-out;
    }
    .result-input {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #93c5fd;
      padding: 10px 12px;
      font-size: 13px;
      outline: none;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 13px;
      color: #fff;
      z-index: 100;
      animation: fadeUp 0.3s ease-out;
      display: none;
    }
    .toast.error { border-color: rgba(239,68,68,0.3); color: #fca5a5; }
    .toast.success { border-color: rgba(52,211,153,0.3); color: #6ee7b7; }
    .confetti-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 99;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      width: 8px; height: 8px;
      top: -10px;
      animation: confettoFall linear forwards;
    }
    @media (max-width: 640px) {
      .paste-input { height: 240px; font-size: 12px; }
    }
  </style>
</head>

  <script>
    // ===== CONFIG =====
    const WORKER_URL = '/v/create'

    // ===== PARTICLES =====
    const canvas = document.getElementById('particleCanvas')
    const ctx = canvas.getContext('2d')
    let particles = []
    let animId

    function resizeParticles() {
      canvas.width = window.innerWidth
      canvas.height = window.innerHeight
    }
    resizeParticles()
    window.addEventListener('resize', resizeParticles)

    class Particle {
      constructor() {
        this.reset()
      }
      reset() {
        this.x = Math.random() * canvas.width
        this.y = Math.random() * canvas.height
        this.size = Math.random() * 2 + 0.5
        this.speedX = (Math.random() - 0.5) * 0.3
        this.speedY = (Math.random() - 0.5) * 0.3
        this.opacity = Math.random() * 0.4 + 0.1
      }
      update() {
        this.x += this.speedX
        this.y += this.speedY
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1
      }
      draw() {
        ctx.beginPath()
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2)
        ctx.fillStyle = `rgba(167, 139, 250, ${this.opacity})`
        ctx.fill()
      }
    }

    function initParticles() {
      const count = Math.min(Math.floor(canvas.width * canvas.height / 8000), 80)
      particles = Array.from({ length: count }, () => new Particle())
    }
    initParticles()

    function drawConnections() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x
          const dy = particles[i].y - particles[j].y
          const dist = Math.sqrt(dx * dx + dy * dy)
          if (dist < 150) {
            ctx.beginPath()
            ctx.moveTo(particles[i].x, particles[i].y)
            ctx.lineTo(particles[j].x, particles[j].y)
            ctx.strokeStyle = `rgba(167, 139, 250, ${0.08 * (1 - dist / 150)})`
            ctx.lineWidth = 0.5
            ctx.stroke()
          }
        }
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height)
      particles.forEach(p => { p.update(); p.draw() })
      drawConnections()
      animId = requestAnimationFrame(animateParticles)
    }
    animateParticles()

    // ===== DOM =====
    const tabPaste = document.getElementById('tabPaste')
    const tabUpload = document.getElementById('tabUpload')
    const pasteView = document.getElementById('pasteView')
    const uploadView = document.getElementById('uploadView')
    const pasteInput = document.getElementById('pasteInput')
    const fileInput = document.getElementById('fileInput')
    const dropZone = document.getElementById('dropZone')
    const submitBtn = document.getElementById('submitBtn')
    const submitText = document.getElementById('submitText')
    const resultCard = document.getElementById('resultCard')
    const resultLink = document.getElementById('resultLink')
    const copyBtn = document.getElementById('copyBtn')
    const loading = document.getElementById('loading')
    const lineCount = document.getElementById('lineCount')
    const charCount = document.getElementById('charCount')
    const toast = document.getElementById('toast')
    const progressBar = document.getElementById('progressBar')
    const progressFill = document.getElementById('progressFill')
    const expirySelect = document.getElementById('expirySelect')

    // ===== TOAST =====
    let toastTimer

    function showToast(msg, type) {
      clearTimeout(toastTimer)
      toast.textContent = msg
      toast.className = 'toast ' + (type || '')
      toast.style.display = 'block'
      toastTimer = setTimeout(() => { toast.style.display = 'none' }, 3000)
    }

    // ===== TABS =====
    function setActiveTab(mode) {
      tabPaste.className = 'tab' + (mode === 'paste' ? ' active' : '')
      tabUpload.className = 'tab' + (mode === 'upload' ? ' active' : '')
      pasteView.style.display = mode === 'paste' ? 'block' : 'none'
      uploadView.style.display = mode === 'upload' ? 'block' : 'none'
    }

    tabPaste.onclick = () => setActiveTab('paste')
    tabUpload.onclick = () => setActiveTab('upload')

    // ===== PASTE INPUT =====
    pasteInput.oninput = updateStats

    function updateStats() {
      const text = pasteInput.value
      const lines = text ? text.split('\n').length : 0
      lineCount.textContent = lines.toLocaleString() + ' lines'
      charCount.textContent = text.length.toLocaleString() + ' chars'
    }

    // ===== FILE UPLOAD =====
    dropZone.onclick = () => fileInput.click()

    dropZone.ondragover = (e) => {
      e.preventDefault()
      dropZone.classList.add('dragover')
    }
    dropZone.ondragleave = () => dropZone.classList.remove('dragover')
    dropZone.ondrop = (e) => {
      e.preventDefault()
      dropZone.classList.remove('dragover')
      const file = e.dataTransfer.files[0]
      if (file && file.name.endsWith('.txt')) readFile(file)
      else showToast('Please drop a .txt file', 'error')
    }
    fileInput.onchange = () => {
      if (fileInput.files[0]) readFile(fileInput.files[0])
    }

    function readFile(file) {
      if (file.size > 50 * 1024 * 1024) {
        showToast('File too large (max 50MB)', 'error')
        return
      }
      const reader = new FileReader()
      reader.onload = (e) => {
        pasteInput.value = e.target.result
        updateStats()
        setActiveTab('paste')
        showToast('Loaded ' + file.name, 'success')
      }
      reader.onerror = () => showToast('Failed to read file', 'error')
      reader.readAsText(file)
    }

    // ===== RIPPLE =====
    function createRipple(e) {
      const btn = e.currentTarget
      const rect = btn.getBoundingClientRect()
      const size = Math.max(rect.width, rect.height)
      const x = e.clientX - rect.left - size / 2
      const y = e.clientY - rect.top - size / 2
      const ripple = document.createElement('span')
      ripple.className = 'ripple'
      ripple.style.width = ripple.style.height = size + 'px'
      ripple.style.left = x + 'px'
      ripple.style.top = y + 'px'
      btn.appendChild(ripple)
      ripple.addEventListener('animationend', () => ripple.remove())
    }
    submitBtn.addEventListener('click', createRipple)
    copyBtn.addEventListener('click', createRipple)

    // ===== CONFETTI =====
    function fireConfetti() {
      const container = document.createElement('div')
      container.className = 'confetti-container'
      document.body.appendChild(container)
      const colors = ['#3b82f6', '#a78bfa', '#f472b6', '#34d399', '#fbbf24', '#60a5fa']
      const shapes = ['circle', 'square']
      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div')
        piece.className = 'confetti-piece'
        const color = colors[Math.floor(Math.random() * colors.length)]
        const size = Math.random() * 6 + 4
        const shape = shapes[Math.floor(Math.random() * shapes.length)]
        piece.style.width = size + 'px'
        piece.style.height = (shape === 'circle' ? size : size * 0.6) + 'px'
        piece.style.borderRadius = shape === 'circle' ? '50%' : '2px'
        piece.style.background = color
        piece.style.left = Math.random() * 100 + '%'
        piece.style.animationDuration = (Math.random() * 2 + 2) + 's'
        piece.style.animationDelay = (Math.random() * 0.5) + 's'
        container.appendChild(piece)
      }
      setTimeout(() => container.remove(), 4000)
    }

    // ===== SUBMIT =====
    submitBtn.onclick = async () => {
      const content = pasteInput.value
      if (!content.trim()) {
        showToast('Paste something first', 'error')
        return
      }

      submitBtn.disabled = true
      submitText.textContent = 'Creating...'
      resultCard.style.display = 'none'
      loading.style.display = 'block'
      progressBar.classList.add('active')
      progressFill.style.width = '0%'

      try {
        progressFill.style.width = '20%'
        await new Promise(r => setTimeout(r, 100))
        progressFill.style.width = '40%'

        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content, expiresIn: parseInt(expirySelect.value) })
        })
        progressFill.style.width = '80%'

        if (!res.ok) {
          const err = await res.text().catch(() => 'Unknown error')
          throw new Error(err)
        }

        const data = await res.json()
        progressFill.style.width = '100%'

        resultLink.value = data.link
        resultCard.style.display = 'block'

        showToast('Paste created!', 'success')
        fireConfetti()

      } catch (err) {
        showToast(err.message || 'Something went wrong', 'error')
      } finally {
        loading.style.display = 'none'
        submitBtn.disabled = false
        submitText.textContent = 'Generate Link'
        setTimeout(() => {
          progressBar.classList.remove('active')
          progressFill.style.width = '0%'
        }, 500)
      }
    }

    // ===== COPY =====
    copyBtn.onclick = () => {
      resultLink.select()
      navigator.clipboard.writeText(resultLink.value).then(() => {
        copyBtn.textContent = 'Copied!'
        setTimeout(() => { copyBtn.textContent = 'Copy' }, 2000)
      }).catch(() => {
        document.execCommand('copy')
        copyBtn.textContent = 'Copied!'
        setTimeout(() => { copyBtn.textContent = 'Copy' }, 2000)
      })
    }

    // ===== KEYBOARD =====
    pasteInput.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitBtn.click()
    })
  </script>
</body>
</html>
